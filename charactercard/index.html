<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A character card for Snortleblat, the Swamp Beast Diplomat.">
    <title>Character Card</title>
    <link rel="stylesheet" href="style.css">
    <script src="characterCard.js" defer></script>
</head>
<body>
    <main>
    <article class="card">
        <img class="image" alt="Snortleblat character portrait" width="400" height="400"/>
        <h1 class="name"></h1>
        <div class="stats">
            <p id="characterClass"></p>
            <p class="health"></p>
            <p id="level"></p>
        </div>
        <!-- <p id="characterDescription"></p> -->
        <div class="buttons">
            <button id="attackButton">Attack</button>
            <button id="levelUp">Level Up</button>
        </div>
    </article>
    </main>
</body>
</html>
